<!DOCTYPE html>

<title>Lista del Comprador</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.app{padding:1rem;max-width:680px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.title{font-size:18px;font-weight:600;color:#1a1a1a}
.subtitle{font-size:13px;color:#888;margin-top:2px}
.tabs{display:flex;gap:6px;margin-bottom:.75rem}
.tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;-webkit-tap-highlight-color:transparent}
.tab.active{background:#e8f0fd;color:#1a56db;border-color:#a4c0f8}
.tab.tab-d.active{background:#f0e8fd;color:#6b21a8;border-color:#c4a8f8}
.tab.done-tab{border-color:#a3d9be;color:#1d9e75}
.steps{display:flex;align-items:center;margin-bottom:1rem}
.step{display:flex;align-items:center;gap:5px;font-size:12px;color:#aaa;font-weight:500}
.step.active{color:#1a56db}.step.done-step{color:#1d9e75}
.step-num{width:22px;height:22px;border-radius:50%;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:#f5f5f3;flex-shrink:0}
.step.active .step-num{background:#e8f0fd;color:#1a56db;border-color:#a4c0f8}
.step.done-step .step-num{background:#eaf7f0;color:#1d9e75;border-color:#a3d9be}
.step-line{flex:1;height:1px;background:#e0e0e0;margin:0 6px}
.progress{height:5px;background:#e0e0e0;border-radius:3px;margin-bottom:.75rem;overflow:hidden}
.progress-bar{height:100%;background:#1d9e75;border-radius:3px;transition:width .3s}
.stats{display:flex;gap:8px;margin-bottom:.75rem}
.stat{flex:1;background:#fff;border-radius:8px;padding:10px;text-align:center;border:1px solid #e8e8e8}
.stat-n{font-size:22px;font-weight:600;color:#1a1a1a}
.stat-l{font-size:11px;color:#888;margin-top:2px}
.section{margin-bottom:1rem}
.sec-hdr{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;padding:4px 0 5px;border-bottom:1px solid #e8e8e8;margin-bottom:4px;display:flex;justify-content:space-between}
.item{display:grid;grid-template-columns:24px 1fr auto auto auto;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1px solid #e8e8e8;background:#fff;margin-bottom:5px}
.item.pedido{border-color:#e8a020}
.item.done-item{opacity:.4}
.item.done-item .iname{text-decoration:line-through;color:#aaa}
.item input[type=checkbox]{width:20px;height:20px;accent-color:#1d9e75;cursor:pointer}
.iname-wrap{display:flex;flex-direction:column;gap:3px;min-width:0}
.iname{font-size:14px;color:#1a1a1a;line-height:1.3}
.itag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;width:fit-content}
.itag.d1{background:#fef3e2;color:#92400e}.itag.d2{background:#fde68a;color:#78350f}
.itag.d3{background:#fb923c;color:#431407}.itag.d7{background:#dc2626;color:#fff}
.itag-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7;flex-shrink:0}
.ipres{font-size:11px;color:#bbb;text-align:right;min-width:80px}
.imin{font-size:11px;color:#666;background:#f5f5f3;border-radius:4px;padding:2px 7px;min-width:60px;text-align:center;white-space:nowrap}
.imin.emp{opacity:.3}
.iqty{width:54px;padding:5px 6px;border-radius:7px;border:1px solid #ddd;background:#f9f9f9;color:#1a1a1a;font-size:13px;text-align:center}
.col-hdr{display:grid;grid-template-columns:24px 1fr auto auto auto;gap:8px;padding:3px 12px 5px;font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:.04em}
.col-hdr span:nth-child(3){text-align:right;min-width:80px}
.col-hdr span:nth-child(4){min-width:60px;text-align:center}
.col-hdr span:nth-child(5){width:54px;text-align:center}
.empty-msg{text-align:center;padding:2.5rem;color:#bbb;font-size:14px}
.area-lbl{font-size:12px;font-weight:600;color:#888;padding:8px 0 4px;display:flex;align-items:center;gap:8px}
.area-lbl-line{flex:1;height:1px;background:#e8e8e8}
.alert-box{background:#fef3e2;border:1px solid #fb923c;border-radius:10px;padding:10px 14px;margin-bottom:.75rem;font-size:12px;color:#92400e;display:none}
.alert-box strong{font-weight:600;display:block;margin-bottom:4px;font-size:13px}
.alert-box ul{padding-left:14px;line-height:2}
.small-btn{padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:none;color:#666;-webkit-tap-highlight-color:transparent}
.small-btn:active{background:#f0f0f0}
.btn-main{width:100%;padding:14px;border-radius:10px;border:none;background:#1d9e75;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:.5rem;-webkit-tap-highlight-color:transparent}
.btn-main:active{opacity:.85}
.btn-main:disabled{opacity:.35;cursor:not-allowed}
.btn-blue{width:100%;padding:14px;border-radius:10px;border:none;background:#1a56db;color:#fff;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-blue:active{opacity:.85}
.btn-blue:disabled{opacity:.35;cursor:not-allowed}
.btn-out{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#555;font-size:14px;cursor:pointer;margin-top:.5rem;-webkit-tap-highlight-color:transparent}
.btn-out:active{background:#f5f5f3}
.wrap-bottom{margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e8e8e8}
.notas-box{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.notas-ttl{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.notas-sub{font-size:12px;color:#888;margin-bottom:.75rem;line-height:1.5}
.notas-ta{width:100%;min-height:72px;padding:9px 11px;border-radius:8px;border:1px solid #ddd;background:#f9f9f9;color:#1a1a1a;font-size:13px;font-family:inherit;resize:vertical;line-height:1.6}
.notas-ta:focus{outline:none;border-color:#1a56db}
.extra-row{display:flex;gap:7px;margin-bottom:6px;align-items:center}
.extra-row input{padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#f9f9f9;color:#1a1a1a;font-size:13px}
.extra-row button{padding:8px 11px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;font-size:16px;flex-shrink:0}
.extra-entry{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:#f9f9f9;border:1px solid #e8e8e8;margin-bottom:4px;font-size:13px}
.extra-entry.done-e{opacity:.4;text-decoration:line-through}
.extra-entry input[type=checkbox]{width:18px;height:18px;accent-color:#1d9e75;cursor:pointer;flex-shrink:0}
.extra-txt{flex:1;color:#1a1a1a}
.extra-cant{font-size:12px;color:#666;background:#e8e8e8;padding:2px 7px;border-radius:4px}
.extra-marca{font-size:11px;color:#aaa;font-style:italic}
.extra-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 2px}
.conf-hdr{background:#f9f9f9;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;border:1px solid #e8e8e8}
.conf-ttl{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.conf-sub{font-size:13px;color:#888}
.conf-hint{font-size:12px;color:#aaa;margin-bottom:.75rem;padding:0 2px}

.conf-item.pedido{border-color:#e8a020}
.conf-item input[type=checkbox]{width:20px;height:20px;accent-color:#dc2626;cursor:pointer}
.conf-item-name{flex:1;font-size:14px;color:#1a1a1a}
.conf-item-pres{font-size:12px;color:#bbb}
.nota-wrap{grid-column:2/-1;margin-top:3px}
.nota-inp{width:100%;padding:6px 9px;border-radius:7px;border:1px solid #e8e8e8;background:#f9f9f9;color:#888;font-size:12px;font-family:inherit}
.nota-inp:focus{outline:none;border-color:#1a56db;color:#1a1a1a}
.nota-inp::placeholder{color:#ccc}
.status-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:.75rem;border:1px solid}
.status-bar.ok{background:#eaf7f0;border-color:#a3d9be;color:#1d6e4e}
.status-bar.err{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.status-bar.loading{background:#f0f4ff;border-color:#a4c0f8;color:#1a56db}
.spinner{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.resumen-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:.75rem}
.resumen-card-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:6px;display:flex;justify-content:space-between}
.resumen-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;background:#eaf7f0;color:#1d9e75}
.resumen-badge.empty{background:#f5f5f3;color:#aaa}
.resumen-badge.pending{background:#e8f0fd;color:#1a56db}</style>
</head>
<body>
<div class="app">
  <div id="s-inicio">
    <div style="text-align:center;padding:2.5rem 0 2rem">
      <div style="font-size:52px;margin-bottom:.75rem">🛒</div>
      <div style="font-size:19px;font-weight:600;margin-bottom:8px;color:#1a1a1a">Modo Comprador</div>
      <div style="font-size:13px;color:#888;line-height:1.7">Carga la lista que tu equipo preparó<br>con las 3 áreas consolidadas.</div>
    </div>
    <div id="status-load" class="status-bar" style="display:none"></div>
    <div class="wrap-bottom">
      <button class="btn-main" onclick="cargarLista()">Actualizar lista →</button>
    </div>

  <div id="s-comprando" style="display:none">
    <div class="topbar">
      <div><div class="title">Comprando</div><div class="subtitle" id="comp-sub">—</div></div>
      <button class="small-btn" onclick="volverInicio()">← Nueva lista</button>

    <div class="alert-box" id="pedidos-alert">

    <div class="notas-box" id="notas-box" style="display:none">
      <div class="notas-ttl">Indicaciones para esta compra</div>
      <div id="notas-disp" style="font-size:13px;color:#666;line-height:1.6;white-space:pre-wrap;display:none"></div>
      <div id="extras-wrap"></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="sc-total">0</div><div class="stat-l">A comprar</div></div>
      <div class="stat"><div class="stat-n" id="sc-done">0</div><div class="stat-l">Comprados</div></div>
      <div class="stat"><div class="stat-n" id="sc-left">0</div><div class="stat-l">Pendientes</div></div>
    </div>
    <div id="c-comprando"></div>
    <div class="wrap-bottom">
      <button class="btn-out" onclick="clearAll()">Limpiar palomitas</button>
    </div>
  </div>
</div>

function tagHTML(d){if(!d)return'';const c={1:'d1',2:'d2',3:'d3',7:'d7'};return`<span class="itag ${c[d]}"><span class="itag-dot"></span>${TAG_LABELS[d]}</span>`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');}
function catDisplay(c){return c.replace(/^(BARRA|COCINA)__/,'');}
function catPfx(c){const m=c.match(/^(BARRA|COCINA)__/);return m?m[1]:null;}
function areaLabel(a){return a==='barra'?'Barra':a==='cocina'?'Cocina':'Desechables';}
function setStatus(id,type,msg){const el=document.getElementById(id);if(!el)return;el.className='status-bar '+type;el.style.display='flex';el.innerHTML=type==='loading'?`<div class="spinner"></div><span>${msg}</span>`:`<span>${msg}</span>`;}
function hideStatus(id){const el=document.getElementById(id);if(el)el.style.display='none';}

let BL=null;

async function fetchConProxy(targetUrl){
  const proxies=[
    u=>'https://api.allorigins.win/get?url='+encodeURIComponent(u),
    u=>'https://corsproxy.io/?'+encodeURIComponent(u),
    u=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u),
  ];
  for(const proxy of proxies){
    try{
      const r=await fetch(proxy(targetUrl),{signal:AbortSignal.timeout(8000)});
      if(!r.ok)continue;
      const ct=r.headers.get('content-type')||'';
      if(ct.includes('json')){
        const j=await r.json();
        return j.contents||j.data||JSON.stringify(j);
      }
      return await r.text();
    }catch(e){continue;}
  }
  throw new Error('Todos los proxies fallaron');
}
async function cargarLista(){
  setStatus('status-load','loading','Buscando lista...');
  try{
    const txt=await fetchConProxy(SCRIPT_URL+'?t='+Date.now());
    if(!txt||txt.trim()===''){setStatus('status-load','err','No hay lista disponible todavía.');return;}
    const data=JSON.parse(txt);
    if(!data.cats||!data.cats.length){setStatus('status-load','err','La lista está vacía.');return;}
    BL=data;
    BL.cats.forEach(c=>c.items.forEach(it=>{it.done=false;it.qty='';it.nota=''}));
    if(BL.extras)BL.extras.forEach(e=>e.done=false);
    hideStatus('status-load');
    document.getElementById('s-inicio').style.display='none';
    document.getElementById('s-comprando').style.display='';
    renderComprando();
  }catch(e){
    setStatus('status-load','err','Error de conexión. Verifica tu internet.');
  }
}
function volverInicio(){
  document.getElementById('s-comprando').style.display='none';
  document.getElementById('s-inicio').style.display='';
  hideStatus('status-load');
}
function toggleItem(ci,ii){BL.cats[ci].items[ii].done=!BL.cats[ci].items[ii].done;renderComprando();}
function setQty(ci,ii,v){BL.cats[ci].items[ii].qty=v;}
function setNota(ci,ii,v){BL.cats[ci].items[ii].nota=v;}
function toggleExtra(id){const e=BL.extras.find(x=>x.id===id);if(e)e.done=!e.done;renderComprando();}
function clearAll(){BL.cats.forEach(c=>c.items.forEach(it=>it.done=false));if(BL.extras)BL.extras.forEach(e=>e.done=false);renderComprando();}

function renderComprando(){
  let total=BL.cats.reduce((s,c)=>s+c.items.length,0)+(BL.extras?BL.extras.length:0);
  let done=BL.cats.reduce((s,c)=>s+c.items.filter(i=>i.done).length,0)+(BL.extras?BL.extras.filter(e=>e.done).length:0);
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pbar-c').style.width=pct+'%';
  document.getElementById('comp-sub').textContent=pct+'% completado — Barra + Cocina + Desechables';
  document.getElementById('sc-total').textContent=total;
  document.getElementById('sc-done').textContent=done;
  document.getElementById('sc-left').textContent=total-done;
  const pp=[];BL.cats.forEach(c=>c.items.forEach(it=>{if(it.dias>0&&!it.done)pp.push(it);}));
  const pa=document.getElementById('pedidos-alert');
  if(pp.length){pa.style.display='block';document.getElementById('pedidos-list').innerHTML=pp.sort((a,b)=>b.dias-a.dias).map(i=>`<li><strong>${esc(i.name)}</strong> — ${TAG_LABELS[i.dias]}</li>`).join('');}
  else pa.style.display='none';
  const hasN=BL.notas&&BL.notas.trim();const hasE=BL.extras&&BL.extras.length;
  const nb=document.getElementById('notas-box');
  if(!hasN&&!hasE){nb.style.display='none';}
  else{
    nb.style.display='';
    const nd=document.getElementById('notas-disp');nd.textContent=BL.notas||'';nd.style.display=hasN?'':'none';
    if(hasE){
      let eh='<div style="margin-top:.5rem"><div style="font-size:12px;font-weight:600;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">Artículos extra</div>';
      eh+=BL.extras.map(e=>`<div class="extra-entry${e.done?' done-e':''}"><input type="checkbox" ${e.done?'checked':''} onchange="toggleExtra(${e.id})"/><span class="extra-txt">${esc(e.name)}</span>${e.cant?`<span class="extra-cant">${esc(e.cant)}</span>`:''} ${e.marca?`<span class="extra-marca">${esc(e.marca)}</span>`:''}</div>`).join('');
      eh+='</div>';document.getElementById('extras-wrap').innerHTML=eh;
    }else document.getElementById('extras-wrap').innerHTML='';
  }
  // Group by area for display
  const areas=['barra','cocina','desechables'];
  let html='';
  areas.forEach(a=>{
    const areaCats=BL.cats.filter(c=>c.area===a);
    if(!areaCats.length)return;
    const aTotal=areaCats.reduce((s,c)=>s+c.items.length,0);
    const aDone=areaCats.reduce((s,c)=>s+c.items.filter(i=>i.done).length,0);
    html+=`<div class="area-lbl"><span>${areaLabel(a)} — ${aDone}/${aTotal}</span><div class="area-lbl-line"></div></div>`;
    html+='<div class="col-hdr"><span></span><span>Insumo</span><span>Presentación</span><span>Mínimo</span><span>Cant.</span></div>';
    areaCats.forEach((c,ci)=>{
      const realCi=BL.cats.indexOf(c);
      const dc=c.items.filter(i=>i.done).length;
      const rows=c.items.map((it,ii)=>`
        <div class="item${it.done?' done-item':''}${it.dias>0?' pedido':''}">
          <input type="checkbox" ${it.done?'checked':''} onchange="toggleItem(${realCi},${ii})"/>
          <div class="iname-wrap"><span class="iname">${esc(it.name)}</span>${tagHTML(it.dias)}</div>
          <span class="ipres">${esc(it.pres)}</span>
          <span class="imin${it.min?'':' emp'}">${it.min?esc(it.min):'—'}</span>
          <input class="iqty" type="text" placeholder="Cant." value="${esc(it.qty)}" onchange="setQty(${realCi},${ii},this.value)"/>
          <div class="nota-wrap"><input class="nota-inp" type="text" placeholder="Anotación: marca alternativa, tienda..." value="${esc(it.nota)}" onchange="setNota(${realCi},${ii},this.value)"/></div>
        </div>`).join('');
      html+=`<div class="section"><div class="sec-hdr"><span>${esc(c.cat)}</span><span>${dc}/${c.items.length}</span></div>${rows}</div>`;
    });
  });
  document.getElementById('c-comprando').innerHTML=html||'<div class="empty-msg">No hay artículos seleccionados</div>';
}
</script>
</body>
</html>
