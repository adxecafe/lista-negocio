<!DOCTYPE html>

<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#0f172a;font-size:15px;}
  .hdr{background:#0f172a;padding:18px 16px 14px;display:flex;align-items:flex-end;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .hdr-left h1{font-size:22px;font-weight:500;color:#f1f5f9;letter-spacing:-0.5px;}
  .hdr-left p{font-size:11px;color:#64748b;margin-top:3px;}
  .hdr-badge{background:#1e3a5f;color:#93c5fd;font-size:10px;font-weight:500;padding:5px 10px;border-radius:20px;}
  .tabs{background:#0f172a;padding:0 14px 14px;display:flex;gap:8px;overflow-x:auto;position:sticky;top:68px;z-index:90;}
  .tab{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;color:#64748b;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
  .tab.on{background:#1e3a5f;color:#93c5fd;}
  .panel{display:none;padding-bottom:100px;}
  .panel.on{display:block;}
  .sec-label{font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:#94a3b8;padding:14px 16px 6px;}
  .item{padding:10px 16px;background:white;border-bottom:0.5px solid #f1f5f9;}
  .item:first-of-type{border-top:0.5px solid #f1f5f9;}
  .item-top{display:flex;align-items:center;gap:10px;}
  .iinfo{flex:1;min-width:0;}
  .iname{font-size:13px;color:#0f172a;font-weight:500;}
  .ipres{font-size:11px;color:#94a3b8;margin-top:1px;}
  .tipo-sel{display:flex;gap:4px;flex-shrink:0;}
  .tipo-btn{padding:5px 8px;border-radius:8px;border:1.5px solid #e2e8f0;background:white;font-size:11px;font-weight:500;color:#64748b;cursor:pointer;white-space:nowrap;}
  .tipo-btn.on-check{border-color:#1e40af;background:#eff6ff;color:#1e40af;}
  .tipo-btn.on-pieza{border-color:#059669;background:#ecfdf5;color:#059669;}
  .tipo-btn.on-peso{border-color:#d97706;background:#fffbeb;color:#d97706;}
  .item-bottom{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .sub-sel{display:flex;align-items:center;gap:5px;}
  .sub-sel label{font-size:10px;color:#94a3b8;font-weight:500;}
  .sub-sel select{border:1.5px solid #e2e8f0;border-radius:8px;padding:4px 8px;font-size:11px;color:#0f172a;background:white;font-family:inherit;}
  .footer{position:fixed;bottom:0;left:0;right:0;background:white;border-top:0.5px solid #f1f5f9;padding:12px 16px;display:flex;gap:10px;z-index:200;}
  .btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
  .btn-sec{background:#f8fafc;color:#64748b;}
  .btn-prim{background:#1e40af;color:white;}
  .btn:active{opacity:.85;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#0f172a;color:#f1f5f9;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;white-space:nowrap;}
  .toast.show{opacity:1;}
  .leyenda{margin:12px 16px;padding:12px 14px;background:white;border-radius:12px;border:0.5px solid #e2e8f0;display:flex;gap:12px;flex-wrap:wrap;}
  .ley-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#64748b;}
  .ley-dot{width:8px;height:8px;border-radius:50%;}
</style>

var config={};

function cargarConfig(){
  try{var r=localStorage.getItem(STORAGE_KEY);if(r)config=JSON.parse(r);}catch(e){}
  AREAS.forEach(function(a){a.categorias.forEach(function(c){c.items.forEach(function(it){
    if(!config[it.id])config[it.id]={tipo:'check',unidad:'gr',tienda:''};
  });});});
}

function guardarConfig(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(config));mostrarToast('Configuración guardada ✓');}
  catch(e){mostrarToast('Error al guardar');}
}

function resetConfig(){
  if(!confirm('¿Restablecer toda la configuración?'))return;
  AREAS.forEach(function(a){a.categorias.forEach(function(c){c.items.forEach(function(it){
    config[it.id]={tipo:'check',unidad:'gr',tienda:''};
  });});});
  renderPaneles();
  mostrarToast('Configuración restablecida');
}

function mostrarToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

var areaActiva='barra';

function renderTabs(){
  var cont=document.getElementById('tabs');cont.innerHTML='';
  AREAS.forEach(function(a){
    var d=document.createElement('div');
    d.className='tab'+(a.id===areaActiva?' on':'');
    d.id='tab-'+a.id;d.textContent=a.nombre;
    d.onclick=function(){
      areaActiva=a.id;
      document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
      d.classList.add('on');
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
      document.getElementById('panel-'+a.id).classList.add('on');
    };
    cont.appendChild(d);
  });
}

function renderPaneles(){
  var cont=document.getElementById('paneles');cont.innerHTML='';
  AREAS.forEach(function(a){
    var panel=document.createElement('div');
    panel.className='panel'+(a.id===areaActiva?' on':'');
    panel.id='panel-'+a.id;

    var ley=document.createElement('div');ley.className='leyenda';
    ley.innerHTML='<div class="ley-item"><div class="ley-dot" style="background:#1e40af"></div><span>☑ Solo marcar</span></div><div class="ley-item"><div class="ley-dot" style="background:#059669"></div><span># Piezas</span></div><div class="ley-item"><div class="ley-dot" style="background:#d97706"></div><span>≈ Cantidad</span></div>';
    panel.appendChild(ley);

    a.categorias.forEach(function(cat){
      var sec=document.createElement('div');sec.className='sec-label';sec.textContent=cat.nombre;panel.appendChild(sec);
      cat.items.forEach(function(it){
        var cfg=config[it.id]||{tipo:'check',unidad:'gr',tienda:''};
        var wrap=document.createElement('div');wrap.className='item';

        // Fila superior: nombre + tipo
        var top=document.createElement('div');top.className='item-top';
        var info=document.createElement('div');info.className='iinfo';
        info.innerHTML='<div class="iname">'+it.nombre+'</div>'+(it.pres?'<div class="ipres">'+it.pres+'</div>':'');

        var sel=document.createElement('div');sel.className='tipo-sel';
        var tipos=['check','pieza','peso'];
        var labels=['☑','# pz','≈ kg'];
        tipos.forEach(function(tipo,i){
          var btn=document.createElement('button');
          btn.className='tipo-btn'+(cfg.tipo===tipo?' on-'+tipo:'');
          btn.textContent=labels[i];
          btn.onclick=function(){
            config[it.id]=Object.assign({},config[it.id]||{},{tipo:tipo});
            sel.querySelectorAll('.tipo-btn').forEach(function(b){b.className='tipo-btn';});
            btn.className='tipo-btn on-'+tipo;
            var unSel=document.getElementById('unidad-'+it.id);
            if(unSel)unSel.style.display=tipo==='peso'?'flex':'none';
          };
          sel.appendChild(btn);
        });

        top.appendChild(info);top.appendChild(sel);wrap.appendChild(top);

        // Fila inferior: unidad + tienda
        var bottom=document.createElement('div');bottom.className='item-bottom';

        // Selector unidad
        var unWrap=document.createElement('div');unWrap.className='sub-sel';
        unWrap.id='unidad-'+it.id;
        unWrap.style.display=cfg.tipo==='peso'?'flex':'none';
        var unLbl=document.createElement('label');unLbl.textContent='Unidad:';
        var unSel=document.createElement('select');
        ['gr','kg','ml','lt','pz'].forEach(function(u){
          var opt=document.createElement('option');opt.value=u;opt.textContent=u;
          if((cfg.unidad||'gr')===u)opt.selected=true;
          unSel.appendChild(opt);
        });
        unSel.onchange=function(ev){config[it.id]=Object.assign({},config[it.id]||{},{unidad:ev.target.value});};
        unWrap.appendChild(unLbl);unWrap.appendChild(unSel);bottom.appendChild(unWrap);

        // Selector tienda
        var tWrap=document.createElement('div');tWrap.className='sub-sel';
        var tLbl=document.createElement('label');tLbl.textContent='Tienda:';
        var tSel=document.createElement('select');
        TIENDAS.forEach(function(t){
          var opt=document.createElement('option');opt.value=t==='—'?'':t;opt.textContent=t;
          if((cfg.tienda||'')===(t==='—'?'':t))opt.selected=true;
          tSel.appendChild(opt);
        });
        tSel.onchange=function(ev){config[it.id]=Object.assign({},config[it.id]||{},{tienda:ev.target.value});};
        tWrap.appendChild(tLbl);tWrap.appendChild(tSel);bottom.appendChild(tWrap);

        wrap.appendChild(bottom);
        panel.appendChild(wrap);
      });
    });
    cont.appendChild(panel);
  });
}

cargarConfig();renderTabs();renderPaneles();
